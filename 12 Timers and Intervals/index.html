<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Simulation</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

/* Alert banner */

.alert{
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:white;
    padding:12px 25px;
    border-radius:6px;
    font-size:15px;
    transition:opacity 0.5s ease;
}

/* Main container */

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
    margin-bottom:20px;
}

.progress-container{
    width:100%;
    height:22px;
    background:#e6e6e6;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:15px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#667eea,#764ba2);
}

#precentText{
    font-size:18px;
    font-weight:bold;
    color:#333;
}

</style>
</head>

<body>

<div class="alert" id="alertBanner">
    Download started...
</div>

<div class="container">

    <h2>Downloading...</h2>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <p id="precentText">0%</p>

</div>

<script src="script12.js"></script>

</body>
</html>
